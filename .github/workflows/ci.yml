name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install validation deps
        run: pip install pyyaml
      - name: Validate skill structure
        run: python scripts/validate_skill.py
      - name: Validate README quality
        run: python scripts/validate_readme_quality.py
      - name: Validate evidence status values
        run: python scripts/validate_evidence_status.py templates examples/outputs examples/fixtures examples/generated-demo-workspace
      - name: Block unsupported strong claims
        run: python scripts/check_claims_before_prose.py examples/fixtures/claims/unsupported-strong-claim.csv --expect-block
      - name: Block unsupported Chinese strong claims
        run: python scripts/check_claims_before_prose.py examples/fixtures/claims/chinese-unsupported-claim.csv --expect-block
      - name: Allow supported claim fixture
        run: python scripts/check_claims_before_prose.py examples/fixtures/claims/supported-claim.csv
      - name: Generate research paper workspace
        run: python scripts/init_project.py --out /tmp/paper_workspace --type research_paper
      - name: Generate undergraduate thesis workspace
        run: python scripts/init_project.py --out /tmp/thesis_workspace --type undergraduate_thesis
      - name: Run research demo workspace
        run: python scripts/demo_academic_workflow.py --mode research_paper --out /tmp/demo_paper_workspace
      - name: Validate research demo workspace
        run: python scripts/validate_demo_workspace.py /tmp/demo_paper_workspace --mode research_paper
      - name: Run thesis demo workspace
        run: python scripts/demo_academic_workflow.py --mode undergraduate_thesis --out /tmp/demo_thesis_workspace
      - name: Validate thesis demo workspace
        run: python scripts/validate_demo_workspace.py /tmp/demo_thesis_workspace --mode undergraduate_thesis
      - name: Regenerate committed thesis demo workspace
        run: python scripts/demo_academic_workflow.py --mode undergraduate_thesis --out examples/generated-demo-workspace --force
      - name: Validate committed thesis demo workspace
        run: python scripts/validate_demo_workspace.py examples/generated-demo-workspace --mode undergraduate_thesis
      - name: Regenerate claim blocker report
        run: python scripts/check_claims_before_prose.py examples/generated-demo-workspace --expect-block --report examples/outputs/claim-blocker-report.generated.md
      - name: Regenerate pre-prose gate report
        run: python scripts/pre_prose_check.py examples/generated-demo-workspace --expect-block --report examples/outputs/pre-prose-check.generated.md
      - name: Ensure generated academic demos are committed
        run: git diff --exit-code examples/generated-demo-workspace examples/outputs/claim-blocker-report.generated.md examples/outputs/pre-prose-check.generated.md
